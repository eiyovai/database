version: "3.8"

services:
  # ========== SQL Server 数据库 ==========
  sqlserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.sqlserver
    image: campus-visitor-db:latest
    container_name: campus-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourPassword123!
      - SA_PASSWORD=YourPassword123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourPassword123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 30s

  # ========== 后端 API ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: campus-visitor-api:latest
    container_name: campus-backend
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=CampusVisitorDB;User Id=sa;Password=YourPassword123!;TrustServerCertificate=True
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Key=CampusVisitorDockerKey2024!@#Secure

  # ========== 前端 ==========
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: campus-visitor-frontend:latest
    container_name: campus-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlserver-data:
